---

# tasks file for common
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name:
      - curl
      - git
      - vim
      - htop
    state: present

- name: Ensure common services are running
  service:
    name: cron
    state: started
    enabled: true

- name: Ensure commmon groups exist
  group:
    name: "{{ item }}"
    state: present
  loop:
    - webservers
    - databases
    - monitoring

- name: Ensure common users exist
  user:
    name: "{{ item }}"
    group: "{{ item }}"
    shell: /bin/bash
    state: present
  loop:
    - devops
    - qa
    - monitoring